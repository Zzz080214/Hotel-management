spring:
  datasource:
    url: jdbc:h2:mem:hotel_management_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    show-sql: false

logging:
  level:
    org.hibernate.SQL: warn

auth:
  token:
    secret: test-token-secret-with-enough-length
    admin-ttl-minutes: 480
    wx-ttl-minutes: 43200

wx:
  mini-program:
    dev-login-enabled: true

payment:
  callback-secret: test-payment-callback-secret
