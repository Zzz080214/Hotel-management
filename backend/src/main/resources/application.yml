server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: hotel-management-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/hotel_management?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org.hibernate.SQL: warn

app:
  production: ${APP_PRODUCTION:false}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://127.0.0.1:*,http://localhost:*}

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET:local-dev-token-secret-change-before-production}
    admin-ttl-minutes: ${AUTH_ADMIN_TOKEN_TTL_MINUTES:480}
    wx-ttl-minutes: ${AUTH_WX_TOKEN_TTL_MINUTES:43200}

payment:
  callback-secret: ${PAYMENT_CALLBACK_SECRET:local-payment-callback-secret}

wx:
  mini-program:
    appid: wxde034e388926eef6
    secret: ${WX_MINI_PROGRAM_SECRET:}
    dev-login-enabled: ${WX_DEV_LOGIN_ENABLED:true}
